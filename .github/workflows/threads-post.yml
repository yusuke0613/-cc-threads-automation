name: Threads投稿

on:
  workflow_dispatch:
    inputs:
      draft_file:
        description: '投稿する下書きファイルパス (threads-bot/drafts/ 以下)'
        required: true
        type: string

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ~/.threads-env を生成
        run: |
          cat > ~/.threads-env << 'EOF'
          export THREADS_ACCESS_TOKEN="${{ secrets.THREADS_ACCESS_TOKEN }}"
          export THREADS_USER_ID="${{ secrets.THREADS_USER_ID }}"
          export THREADS_APP_ID="${{ secrets.THREADS_APP_ID }}"
          export THREADS_APP_SECRET="${{ secrets.THREADS_APP_SECRET }}"
          export THREADS_TOKEN_ISSUED_AT="${{ secrets.THREADS_TOKEN_ISSUED_AT }}"
          export THREADS_BOT_DIR="$GITHUB_WORKSPACE/threads-bot"
          EOF
          chmod 600 ~/.threads-env

      - name: 依存ツール確認
        run: |
          jq --version
          curl --version | head -1

      - name: トークン確認
        run: bash .claude/skills/threads-post/scripts/check-token.sh

      - name: Threads投稿
        run: |
          source ~/.threads-env
          bash .claude/skills/threads-post/scripts/post-text.sh \
            "$GITHUB_WORKSPACE/${{ github.event.inputs.draft_file }}"

      - name: 投稿済みファイルをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add threads-bot/posted/ threads-bot/logs/
          git diff --staged --quiet || git commit -m "post: ${{ github.event.inputs.draft_file }}"
          git push
